<script>
    let vocabList = [];

    // Asynchronously pull the 500-word dataset from our JSON file
    async function initializeApp() {
        try {
            // 1. Fetch the vocabulary array file
            const response = await fetch('vocabulary.json');
            const defaultVocabulary = await response.json();

            // 2. Read existing flashcard user metrics from local storage
            const savedData = localStorage.getItem('german_srs_vocab');
            
            if (savedData) {
                vocabList = JSON.parse(savedData);
                
                // If you expand or change the data file, sync structural updates safely
                if (vocabList.length < defaultVocabulary.length) {
                    // Map over new words while keeping existing review records safe
                    const savedMap = new Map(vocabList.map(item => [item.id, item]));
                    vocabList = defaultVocabulary.map(item => {
                        return savedMap.has(item.id) ? savedMap.get(item.id) : item;
                    });
                    localStorage.setItem('german_srs_vocab', JSON.stringify(vocabList));
                }
            } else {
                vocabList = defaultVocabulary;
                localStorage.setItem('german_srs_vocab', JSON.stringify(defaultVocabulary));
            }

            // 3. Kick off the flashcard engine display
            loadSessionCards();

        } catch (error) {
            console.error("Initialization failed: Check if vocabulary.json is in the root directory.", error);
            document.getElementById('vocab-grid').innerHTML = 
                `<div style="color: #ef4444; padding: 2rem;">Error loading vocabulary data file.</div>`;
        }
    }

    function saveToStorage() {
        try {
            localStorage.setItem('german_srs_vocab', JSON.stringify(vocabList));
        } catch (e) {}
    }

    function loadSessionCards() {
        const now = Date.now();
        let dueCards = vocabList.filter(word => word.nextReview <= now);
        
        if (dueCards.length === 0) {
            dueCards = [...vocabList].sort((a, b) => a.nextReview - b.nextReview);
        }
        
        const selected = dueCards.sort(() => 0.5 - Math.random()).slice(0, 3);
        renderCards(selected);
    }

    function renderCards(cards) {
        const grid = document.getElementById('vocab-grid');
        if (cards.length === 0) {
            grid.innerHTML = `<div class="empty-state">🎉 All caught up for now!</div>`;
            return;
        }

        grid.innerHTML = cards.map(word => `
            <div class="vocab-card" id="card-${word.id}">
                <div class="german">${word.de}</div>
                <div class="english hidden" id="eng-${word.id}">${word.en}</div>
                <button class="reveal-btn" id="rev-btn-${word.id}" onclick="revealWord(${word.id})">Reveal Meaning</button>
                <div class="action-buttons hidden" id="actions-${word.id}">
                    <button class="forgot-btn" onclick="rateWord(${word.id}, false)">Forgot</button>
                    <button class="got-btn" onclick="rateWord(${word.id}, true)">Got It</button>
                </div>
            </div>
        `).join('');
    }

    window.revealWord = function(id) {
        document.getElementById(`eng-${id}`).classList.remove('hidden');
        document.getElementById(`actions-${id}`).classList.remove('hidden');
        document.getElementById(`rev-btn-${id}`).classList.add('hidden');
    }

    window.rateWord = function(id, remembered) {
        const wordIndex = vocabList.findIndex(w => w.id === id);
        if (wordIndex === -1) return;

        let word = vocabList[wordIndex];

        if (remembered) {
            word.interval = word.interval === 0 ? 1 : Math.min(word.interval * 2, 720);
        } else {
            word.interval = 0;
        }

        word.nextReview = Date.now() + (word.interval * 60 * 60 * 1000);
        saveToStorage();

        const cardElement = document.getElementById(`card-${id}`);
        cardElement.style.opacity = '0.2';
        cardElement.style.pointerEvents = 'none';
    }

    // Trigger the dynamic loading routine
    initializeApp();
</script>
